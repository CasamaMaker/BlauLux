; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32c3

; =============================================
; HARDWARE PROFILE — canvia flags per seleccionar el hardware
; Opcions: -DPICO_CLICK  |  -DSONOFF_BASIC_R4
; =============================================
[hw_profile]
flags = -DPICO_CLICK
;flags = -DSONOFF_BASIC_R4

; --- Compartit per tots els entorns (herència automàtica) ---
[env]
framework              = arduino
monitor_speed          = 115200
upload_speed           = 460800
board_build.filesystem = littlefs
board_build.flash_mode = qio
platform_packages      = platformio/tool-mklittlefs@^1.203.210628
lib_deps =
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    adafruit/Adafruit NeoPixel@^1.12.3
    https://github.com/marvinroger/async-mqtt-client.git

; --- ESP32-C3 (RISC-V, USB natiu) ---
[env:esp32c3]
platform    = espressif32
board       = esp32-c3-devkitm-1
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ${hw_profile.flags}

; --- ESP32 original (Xtensa dual-core, UART via CH340/CP2102) ---
[env:esp32]
platform    = espressif32
board       = esp32dev
build_flags =
    -DCORE_DEBUG_LEVEL=0
    ${hw_profile.flags}

; --- ESP32-S3 (Xtensa dual-core, USB natiu, BLE 5) ---
[env:esp32s3]
platform    = espressif32
board       = esp32s3_4mb
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ${hw_profile.flags}

; --- ESP32-S2 (Xtensa single-core, USB natiu, sense BLE) ---
[env:esp32s2]
platform    = espressif32
board       = esp32s2saola1
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ${hw_profile.flags}

; --- ESP32-C6 (RISC-V, WiFi 6, USB natiu) ---
; NOTA: si compila amb platform espressif32 v6+, pot caldre actualitzar
; les crides LEDC a main.cpp (ledcSetup/ledcAttachPin → ledcAttach/ledcWrite)
[env:esp32c6]
platform    = espressif32
board       = esp32-c6-devkitc-1
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ${hw_profile.flags}
