[env:arduino-esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1          ; ← C3, no esp32dev (que és Xtensa)
board_build.flash_mode = qio
board_build.filesystem = littlefs
framework = arduino
upload_speed = 460800
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
    ; Si uses USB serial (no UART): descomentar
    ; -DARDUINO_USB_CDC_ON_BOOT=1
    ; -DARDUINO_USB_MODE=1
lib_deps =
    https://github.com/ESP32Async/AsyncTCP.git          ; ← me-no-dev NO suporta C3
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    FastLED@^3.6.0
platform_packages = platformio/tool-mklittlefs@^1.203.210628


