<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" type="text/css" href="style.css" />
  <title>BlauLink Manager</title>
  <script>
    function formatMAC(input) {
        let value = input.value.replace(/[^A-Fa-f0-9]/g, '').toUpperCase();
        let formattedValue = '';
        
        for (let i = 0; i < value.length && i < 12; i += 2) {
            if (i > 0) {
                formattedValue += ':';
            }
            formattedValue += value.substr(i, 2);
        }
        
        input.value = formattedValue;
    }

    function fetchMac() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          document.getElementById("macSaved").innerHTML = this.responseText;
        }
      };
      xhttp.open("GET", "/mac", true);
      xhttp.send();
    }

    function deleteMac() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          fetchMac(); // Actualizar la MAC guardada después de borrar
        }
      };
      xhttp.open("GET", "/deletemac", true);
      xhttp.send();
    }

    function fetchMyMac() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          document.getElementById("myMac").innerHTML = this.responseText;
        }
      };
      xhttp.open("GET", "/mymac", true);
      xhttp.send();
    }

    function fetchMacList() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          const macList = this.responseText.split("\n");
          const macListContainer = document.getElementById("macList");
          macListContainer.innerHTML = '';
          
          if (macList.length === 0 || (macList.length === 1 && macList[0] === "")) {
            macListContainer.innerHTML = '<p class="no-devices">No se han encontrado dispositivos</p>';
            return;
          }
          
          macList.forEach(mac => {
            if (mac.trim() === "") return;
            
            const macDiv = document.createElement("div");
            macDiv.classList.add("mac-item");
            const macParts = mac.split(" >> ");
            if (macParts.length > 1) {
              macDiv.innerText = macParts[1];
              macDiv.setAttribute('data-mac', macParts[0]);
            } else {
              macDiv.innerText = mac;
              macDiv.setAttribute('data-mac', mac);
            }
            macDiv.onclick = function() { setMac(this.getAttribute('data-mac')); };
            macListContainer.appendChild(macDiv);
          });
        }
      };
      xhttp.open("GET", "/macList", true);
      xhttp.send();
    }

    function setMac(mac) {
      document.getElementById("mac").value = mac;
    }

    function refreshDevices() {
      fetchMacList();
    }

    // Nueva función para desconectar WiFi AP
    function disconnectWiFiAP() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4) {
          if (this.status == 200) {
            console.log("Señal de desconexión WiFi AP enviada correctamente");
          } else {
            console.log("Error al enviar señal de desconexión WiFi AP");
          }
        }
      };
      xhttp.open("GET", "/disconnect-ap", true);
      xhttp.send();
    }

    // Función para manejar el clic en el enlace de GitHub
    function handleGitHubClick(event) {
      // Enviar señal al servidor para desconectar WiFi AP
      disconnectWiFiAP();
      
      // Permitir que el enlace se abra normalmente
      // No necesitamos event.preventDefault() porque queremos que el enlace funcione
    }

 // Función para obtener el nivel de batería
    async function fetchBatteryLevel() {
      try {
        if ('getBattery' in navigator) {
          const battery = await navigator.getBattery();
          updateBatteryInfo(battery);
          
          // Actualizar cuando cambie el estado de la batería
          battery.addEventListener('levelchange', () => updateBatteryInfo(battery));
          battery.addEventListener('chargingchange', () => updateBatteryInfo(battery));
        } else {
          // Fallback: intentar obtener del servidor
          fetchBatteryFromServer();
        }
      } catch (error) {
        console.log('Battery API no disponible, intentando obtener del servidor');
        fetchBatteryFromServer();
      }
    }

    function updateBatteryInfo(battery) {
      const level = Math.round(battery.level * 100);
      const isCharging = battery.charging;
      
      // document.getElementById("batteryLevel").textContent = level + '%';
      
      const batteryIcon = document.getElementById("batteryIcon");
      const batteryFill = document.getElementById("batteryFill");
      const batteryPercentage = document.getElementById("batteryPercentage");
      
      // Calcular el ancho del relleno respetando los márgenes del contenedor
      // El contenedor interno tiene width=16 (18-2=16 por los márgenes de 1px a cada lado)
      const maxFillWidth = 26;
      const fillWidth = Math.max(0, Math.min(maxFillWidth, (level / 100) * maxFillWidth));
      
      // Actualizar el relleno de la batería
      batteryFill.setAttribute('width', fillWidth);

      // Actualizar el texto del porcentaje
      batteryPercentage.textContent = level + '%';
      
      // Cambiar color según el nivel
      if (level <= 20) {
        batteryFill.style.fill = '#ff4444';
        batteryPercentage.style.fill = '#fff';
        batteryPercentage.style.stroke = '#000';
      } else if (level <= 50) {
        batteryFill.style.fill = '#ffaa00';
        batteryPercentage.style.fill = '#fff';
        batteryPercentage.style.stroke = '#000';
      } else {
        batteryFill.style.fill = '#44ff44';
        batteryPercentage.style.fill = '#fff';
        batteryPercentage.style.stroke = '#000';
      }
      
      // Mostrar icono de carga si está cargando
      if (isCharging) {
        batteryIcon.classList.add('charging');
      } else {
        batteryIcon.classList.remove('charging');
      }
    }

    function fetchBatteryFromServer() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          try {
            const batteryData = JSON.parse(this.responseText);
            const mockBattery = {
              level: batteryData.level / 100,
              charging: batteryData.charging || false
            };
            updateBatteryInfo(mockBattery);
          } catch (e) {
            // Si no hay respuesta válida, mostrar un valor por defecto
            document.getElementById("batteryPercentage").textContent = '--';
          }
        }
      };
      xhttp.open("GET", "/battery", true);
      xhttp.send();
    }

    // Simular batería para demo
    function simulateBattery() {
      const mockBattery = {
        level: 0.15, // 75%
        charging: false
      };
      updateBatteryInfo(mockBattery);
    }

    window.onload = function() {
      fetchMyMac();
      fetchMac();
      // simulateBattery();  // Para demo, usar batería simulada
      fetchBatteryLevel();  //per llegir info real de bateria
      fetchMacList();

      // Establecer un temporizador para actualizar la lista de dispositivos cada 30 segundos
      setInterval(refreshDevices, 30000);
      // // Actualizar batería cada 60 segundos
      // setInterval(fetchBatteryLevel, 60000);
    }
  </script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title">
        <h1>BlauLink Manager</h1>
      </div>
      <div class="header-right">
        <div class="battery-indicator">
          <div class="battery-icon" id="batteryIcon">
            <svg class="battery-svg" viewBox="0 0 32 16" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="0" stroke-linecap="round" stroke-linejoin="round">
              <!-- Contorno de la batería -->
              <rect x="1" y="2" width="28" height="12" rx="2" class="battery-outline"/>
              <rect x="29.5" y="5" width="1.5" height="6" rx="0.5" class="battery-outline"/>
              <!-- Relleno de la batería -->
              <rect x="2" y="3" width="0" height="10" rx="1" class="battery-fill" id="batteryFill"/>
              <text x="15" y="8" class="battery-percentage" id="batteryPercentage">--</text>
            </svg>
          </div>
        </div>
      <!-- <a href="https://github.com/CasamaMaker/BlauLink" class="github-link" target="_blank">
        <svg class="github-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
        </svg>
      </a> -->
      <!-- <a href="https://github.com/CasamaMaker/BlauLink" class="github-link" id="githubLink" target="_blank">
          <svg class="github-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
          </svg>
      </a> -->
    </header>
    
    <div class="card">
      <label for="myMac">My MAC address</label>
      <div class="values">
        <p><span id="myMac">Loading...</span></p>
      </div>
    </div>
    
    <div class="card">
      <label for="macSaved">Slave MAC address saved</label>
      <div class="values" style="display: flex; justify-content: space-between; align-items: center;">
        <p><span id="macSaved">Loading...</span></p>
        <button onclick="deleteMac()" style="background: none; border: none; cursor: pointer; color: var(--primary-color);">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,6 5,6 21,6"></polyline>
            <path d="m19,6v14a2,2 0 0,1 -2,2H7a2,2 0 0,1 -2,-2V6m3,0V4a2,2 0 0,1 2,-2h4a2,2 0 0,1 2,2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </button>
      </div>
      <!-- <div class="values">
        <p><span id="macSaved">Carregant...</span></p>
      </div> -->
    </div>
    
    <div class="card">
      <form action="/" method="POST">
        <label for="mac">New slave MAC address</label>
        <input type="text" id="mac" name="mac" placeholder="XX:XX:XX:XX:XX:XX" maxlength="17" pattern="([A-Fa-f0-9]{2}:){5}[A-Fa-f0-9]{2}" title="Formato requerido: XX:XX:XX:XX:XX:XX" oninput="formatMAC(this)"/>
        <input type="submit" value="Save" />
      </form>
    </div>
    
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Devices found</h3>
        <button onclick="refreshDevices()" style="background: none; border: none; cursor: pointer; color: var(--primary-color);">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>
      <div id="macList">
        <p>Scanning devices...</p>
      </div>
    </div>
  </div>
  
  <footer>
    <p>BlauLink 2.1 | Martí Casamayor</p>
