<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" type="text/css" href="style.css" />
  <title>Configurador BlauTrigger</title>
  <script>
    let lastDutyValue = 100; // Guardar el último valor del slider

    function formatMAC(input) {
        let value = input.value.replace(/[^A-Fa-f0-9]/g, '').toUpperCase();
        let formattedValue = '';
        
        for (let i = 0; i < value.length && i < 12; i += 2) {
            if (i > 0) {
                formattedValue += ':';
            }
            formattedValue += value.substr(i, 2);
        }
        
        input.value = formattedValue;
    }

    // Función para enviar duty cycle al servidor
    function sendDutyToServer(value) {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4) {
          if (this.status == 200) {
            console.log("Duty enviado correctamente: " + value + "%");
          } else {
            console.error("Error al enviar duty cycle");
          }
        }
      };
      xhttp.open("POST", "/dutty", true);
      xhttp.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
      xhttp.send("value=" + value);
    }

    // Función para manejar cambios en el slider de duty cycle
    function handleDutyChange(slider) {
      const dutyValue = document.getElementById('dutyValue');
      dutyValue.textContent = slider.value + '%';
      lastDutyValue = slider.value; // Guardar el valor actual
      
      // Enviar el valor al servidor
      sendDutyToServer(slider.value);
    }

    // Función para manejar el switch ON/OFF
    function handleTestSwitch(checkbox) {
      const dutySlider = document.getElementById('dutySlider');
      const dutyValue = document.getElementById('dutyValue');
      
      if (checkbox.checked) {
        // Encendido: habilitar slider y restaurar último valor
        dutySlider.disabled = false;
        dutySlider.value = lastDutyValue;
        dutyValue.textContent = lastDutyValue + '%';
        dutySlider.style.opacity = '1';
        // Enviar el valor al servidor
        sendDutyToServer(slider.value);
      } else {
        // Apagado: deshabilitar slider y poner en 0
        dutySlider.disabled = true;
        dutySlider.value = 0;
        dutyValue.textContent = '0%';
        dutySlider.style.opacity = '0.5';
        // Enviar el valor al servidor
        sendDutyToServer(0);
      }
    }

    function fetchMyMac() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          document.getElementById("myMac").innerHTML = this.responseText;
        }
      };
      xhttp.open("GET", "/mymac", true);
      xhttp.send();
    }

    function fetchPins() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          try {
            const data = JSON.parse(this.responseText);
            document.getElementById('pin1').value = data.pin1;
            document.getElementById("pin2").value = data.pin2;
          } catch (e) {
            console.error("Error parsejant /pins:", e);
          }
        }
      };
      xhttp.open("GET", "/pins", true);
      xhttp.send();
    }

    function fetchDriveMode() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          const mode = this.responseText.trim(); // El valor hauria de ser '1', '2' o '3'

          // Seleccionar el radio corresponent
          const radio = document.querySelector(`input[name="control_type"][value="${mode}"]`);
          if (radio) {
            radio.checked = true;
            handleControlTypeChange(); // Actualitza la interfície en base a la selecció
          }

          // (Opcional) Mostrar el valor actual en algun lloc si vols
          // document.getElementById("driverMode").innerHTML = mode;
        }
      };
      xhttp.open("GET", "/driverMode", true);
      xhttp.send();
    }

    //Accions al escollir un tipos de control
    function handleControlTypeChange() {
      const pinLabelTop = document.getElementById('pinLabelTop');
      const pinsContainer = document.getElementById('pinsContainer');
      const pin1Group = document.getElementById('pin1Group');
      const pin2Group = document.getElementById('pin2Group');
      const pinSeparator = document.getElementById('pinSeparator');
      const pin1Label = document.getElementById('pin1Label');
      const pin2Label = document.getElementById('pin2Label');
      const selectedValue = document.querySelector('input[name="control_type"]:checked')?.value;
      
      if (!selectedValue) {
        // No hay selección - ocultar todo el container
        pinLabelTop.style.display = 'none';
        pinsContainer.style.display = 'none';
        return;
      }
      
      // Mostrar el container de pins
      pinLabelTop.style.display = 'flex';
      pinsContainer.style.display = 'flex';
      
      // Configurar según el tipo seleccionado
      switch(selectedValue) {
        case '0': // On/Off
          pin1Label.textContent = 'On/Off';
          pin1Group.style.display = 'flex';
          pin2Group.style.display = 'none';
          pinSeparator.style.display = 'none';
          document.getElementById('pin2').value = '';
          break;

        case '1': // Dig.led
          pin1Label.textContent = 'Digital led';
          pin1Group.style.display = 'flex';
          pin2Group.style.display = 'none';
          pinSeparator.style.display = 'none';
          document.getElementById('pin2').value = '';
          break;
          
        case '2': // Led WW
          pin1Label.textContent = 'PWM';
          pin1Group.style.display = 'flex';
          pin2Group.style.display = 'none';
          pinSeparator.style.display = 'none';
          document.getElementById('pin2').value = '';
          break;
          
        case '3': // Led WW/CW
          pin1Label.textContent = 'WW';
          pin2Label.textContent = 'CW';
          pin1Group.style.display = 'flex';
          // pinSeparator.style.display = 'block';
          
          // Animación de entrada para Pin 2
          pin2Group.style.display = 'flex'; 
          pin2Group.style.opacity = '0';
          pin2Group.style.transform = 'scale(0.8)';
          
          setTimeout(() => {
            pin2Group.style.opacity = '1';
            pin2Group.style.transform = 'scale(1)';
          }, 50);
          break;
      }
      fetchPins();
    }

    // S'executa mentre carrega el html
    document.addEventListener('DOMContentLoaded', function() {
      // Asegurar que no hay pins visibles al inicio
      const pinLabelTop = document.getElementById('pinLabelTop');
      const pinsContainer = document.getElementById('pinsContainer');
      pinLabelTop.style.display = 'none';
      pinsContainer.style.display = 'none';
      
      // // Si hay un valor seleccionado al cargar, aplicar la lógica
      const selectedRadio = document.querySelector('input[name="control_type"]:checked');
      // if (selectedRadio) {
      //   handleControlTypeChange();
      // } else {
      //   // Limpiar valores si no hay selección
      //   document.getElementById('pin1').value = '';
      //   document.getElementById('pin2').value = '';
      // }
    });

    // s'executa al finalitzar de carregar el html
    window.onload = function() {
      fetchMyMac();
      fetchDriveMode();
      fetchPins();

      // Establecer un temporizador para actualizar la lista de dispositivos cada 30 segundos
      // setInterval(refreshDevices, 30000);
      // // Actualizar batería cada 60 segundos
      // setInterval(fetchBatteryLevel, 60000);
    }
  </script>

    <!-- CONTROL Card -->
    <div class="card">
      <form action="/" method="POST">
        
        <!-- Control types section with improved styling -->
        <div class="control-types-section">
          <label class="section-label">Tipos de control</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="control_type" value="0" class="radio-input" onchange="handleControlTypeChange()"/>

    <!-- TEST Card -->
    <div class="card">

      <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 15px;">
