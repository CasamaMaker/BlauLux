<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" type="text/css" href="style.css" />
  <title>Configurador BlauTrigger</title>
  <script>

    function sendDutyToServer(value) {
      fetch('/dutty', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'value=' + value
      });
    }

    function sendDutyCWToServer(value) {
      fetch('/duttyCW', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'value=' + value
      });
    }

    function sendColorToServer(r, g, b) {
      fetch('/color', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `r=${r}&g=${g}&b=${b}`
      });
    }

    // Toggle ON/OFF per a mode 1 (Led digital)
    function handleTestSwitch(checkbox) {
      const selected = document.querySelector('input[name="control_type"]:checked')?.value;
      if (selected === '1') {
        if (checkbox.checked) {
          handleColorChange(document.getElementById('colorPicker'));
        } else {
          sendColorToServer(0, 0, 0);
        }
      }
    }

    // Toggle ON/OFF per a modes 2, 3 i 4 (PWM, WW/CW, Triac)
    function handleDutySwitch(checkbox) {
      const selected = document.querySelector('input[name="control_type"]:checked')?.value;
      if (!checkbox.checked) {
        sendDutyToServer(0);
        if (selected === '3') sendDutyCWToServer(0);
      } else {
        if (selected === '2') {
          sendDutyToServer(document.getElementById('dutySlider').value);
        } else if (selected === '3') {
          sendDutyToServer(document.getElementById('wwSlider').value);
          sendDutyCWToServer(document.getElementById('cwSlider').value);
        } else if (selected === '4') {
          sendDutyToServer(document.getElementById('triacSlider').value);
          sendDutyCWToServer(document.getElementById('triacLEDSlider').value);
        }
      }
    }

    function handleTriacChange(slider) {
      document.getElementById('triacValue').textContent = slider.value + '%';
      sendDutyToServer(slider.value);
    }

    function handleTriacLEDChange(slider) {
      document.getElementById('triacLEDValue').textContent = slider.value + '%';
      sendDutyCWToServer(slider.value);
    }

    function handleColorChange(picker) {
      const isOn = document.getElementById('testSwitch').checked;
      if (!isOn) return;
      const hex = picker.value;
      sendColorToServer(
        parseInt(hex.slice(1,3), 16),
        parseInt(hex.slice(3,5), 16),
        parseInt(hex.slice(5,7), 16)
      );
    }

    function handleBrightnessChange(slider) {
      document.getElementById('brightnessValue').textContent = slider.value + '%';
      sendDutyToServer(slider.value);
    }

    function handleDutyChange(slider) {
      document.getElementById('dutyValue').textContent = slider.value + '%';
      sendDutyToServer(slider.value);
    }

    function handleWWChange(slider) {
      document.getElementById('wwValue').textContent = slider.value + '%';
      sendDutyToServer(slider.value);
    }

    function handleCWChange(slider) {
      document.getElementById('cwValue').textContent = slider.value + '%';
      sendDutyCWToServer(slider.value);
    }

    function fetchMyMac() {
      fetch('/mymac', {method: 'POST'}).then(r => r.text()).then(t => {
        document.getElementById("myMac").innerHTML = t;
      }).catch(() => {});
    }

    function fetchPins() {
      fetch('/pins', {method: 'POST'}).then(r => r.json()).then(data => {
        document.getElementById('pin1').value = data.pin1 !== null ? data.pin1 : '';
        document.getElementById('pin2').value = data.pin2 !== null ? data.pin2 : '';
        document.getElementById('pin3').value = data.pin3 !== null ? data.pin3 : '';
      }).catch(() => {});
    }

    function fetchNumLeds() {
      fetch('/numLeds', {method: 'POST'}).then(r => r.text()).then(t => {
        document.getElementById('numLedsInput').value = parseInt(t.trim()) || 1;
      }).catch(() => {});
    }

    function fetchBrightnessConfig() {
      const selected = document.querySelector('input[name="control_type"]:checked')?.value;
      if (!selected || selected === '0') return;
      fetch('/brightness', {method: 'POST'}).then(r => r.json()).then(data => {
        const map = {'1': data.b1, '2': data.b2, '3': data.b3, '4': data.b4};
        const val = map[selected] ?? 100;
        document.getElementById('brightnessConfigSlider').value = val;
        document.getElementById('brightnessConfigValue').textContent = val + '%';
        if (selected === '3') {
          const cwVal = data.bcw ?? 100;
          document.getElementById('brightnessCWConfigSlider').value = cwVal;
          document.getElementById('brightnessCWConfigValue').textContent = cwVal + '%';
        }
        if (selected === '4') {
          const cwVal = data.bcw ?? 100;
          document.getElementById('brightnessCWConfigSlider').value = cwVal;
          document.getElementById('brightnessCWConfigValue').textContent = cwVal + '%';
        }
        if (selected === '2' || selected === '3') {
          document.getElementById('pwmFreqInput').value = data.pf ?? 5000;
        }
      }).catch(() => {});
    }

    function fetchDriveMode() {
      fetch('/driverMode', {method: 'POST'}).then(r => r.text()).then(mode => {
        const radio = document.querySelector(`input[name="control_type"][value="${mode.trim()}"]`);
        if (radio) { radio.checked = true; updateControlTypeUI(); }
      }).catch(() => {
        updateControlTypeUI();
      });
    }

    function fetchConfigMode() {
      fetch('/configMode', {method: 'POST'}).then(r => r.text()).then(mode => {
        applyConfigMode(mode.trim());
      }).catch(() => {
        applyConfigMode('web');
      });
    }

    function applyConfigMode(mode) {
      const configFields = document.getElementById('configFields');
      const modeInfo = document.getElementById('modeInfo');
      const submitBtn = document.getElementById('submitBtn');

      if (mode === 'hardcoded') {
        configFields.classList.add('disabled-section');
        modeInfo.style.display = 'block';
        submitBtn.style.display = 'none';
      } else {
        configFields.classList.remove('disabled-section');
        modeInfo.style.display = 'none';
        submitBtn.style.display = '';
      }
    }

    function updateControlTypeUI() {
      const selected = document.querySelector('input[name="control_type"]:checked')?.value;
      const pinLabelTop    = document.getElementById('pinLabelTop');
      const pinsContainer  = document.getElementById('pinsContainer');
      const pin1Group      = document.getElementById('pin1Group');
      const pin2Group      = document.getElementById('pin2Group');
      const pin3Group      = document.getElementById('pin3Group');
      const pinSeparator   = document.getElementById('pinSeparator');
      const pinSeparator2  = document.getElementById('pinSeparator2');
      const pin1Label      = document.getElementById('pin1Label');
      const pin2Label      = document.getElementById('pin2Label');
      const pin3Label      = document.getElementById('pin3Label');
      const testToggle     = document.getElementById('testToggleSection');
      const testDigital    = document.getElementById('testDigitalSection');
      const testDuty       = document.getElementById('testDutySection');
      const testDimmer     = document.getElementById('testDimmerSlider');
      const testWW         = document.getElementById('testWWSlider');
      const testCW         = document.getElementById('testCWSlider');
      const testTriac      = document.getElementById('testTriacSlider');
      const brightnessConfig    = document.getElementById('brightnessConfigSection');
      const brightnessCWConfig  = document.getElementById('brightnessCWConfigSection');
      const freqConfig          = document.getElementById('freqConfigSection');
      const numLedsSection      = document.getElementById('numLedsSection');
      const brightnessLabel     = document.getElementById('brightnessConfigLabel');

      // Reset duty switch on mode change
      document.getElementById('testDutySwitch').checked = false;

      if (!selected) {
        pinLabelTop.style.display = 'none';
        pinsContainer.style.display = 'none';
        testToggle.style.display = 'none';
        testDigital.style.display = 'none';
        testDuty.style.display = 'none';
        brightnessConfig.style.display = 'none';
        brightnessCWConfig.style.display = 'none';
        numLedsSection.style.display = 'none';
        document.getElementById('testCard').style.display = 'none';
        return;
      }
      document.getElementById('testCard').style.display = '';

      pinLabelTop.style.display = 'flex';
      pinsContainer.style.display = 'flex';

      // Amaga elements exclusius del mode 4 i freqüència PWM
      pin3Group.style.display = 'none';
      pinSeparator2.style.display = 'none';
      document.getElementById('pin3').value = '';
      document.getElementById('testTriacLEDSlider').style.display = 'none';
      document.getElementById('brightnessCWConfigLabel').textContent = 'Brillantor CW per defecte';
      freqConfig.style.display = 'none';

      switch (selected) {
        case '0': // Relé On/Off
          pin1Label.textContent = 'Relé';
          pin2Label.textContent = 'Led';
          pin1Group.style.display = 'flex';
          pin2Group.style.display = 'flex';
          pin2Group.style.opacity = '0';
          pin2Group.style.transform = 'scale(0.8)';
          setTimeout(() => {
            pin2Group.style.opacity = '1';
            pin2Group.style.transform = 'scale(1)';
          }, 50);
          pinSeparator.style.display = 'flex';
          testToggle.style.display = 'flex';
          testDigital.style.display = 'none';
          testDuty.style.display = 'none';
          brightnessConfig.style.display = 'none';
          brightnessCWConfig.style.display = 'none';
          numLedsSection.style.display = 'none';
          break;

        case '1': // Led digital WS2812
          pin1Label.textContent = 'WS2812';
          pin1Group.style.display = 'flex';
          pin2Group.style.display = 'none';
          pinSeparator.style.display = 'none';
          document.getElementById('pin2').value = '';
          testToggle.style.display = 'flex';
          testDigital.style.display = 'flex';
          testDuty.style.display = 'none';
          brightnessLabel.textContent = 'Brillantor per defecte';
          brightnessConfig.style.display = 'flex';
          brightnessCWConfig.style.display = 'none';
          numLedsSection.style.display = 'flex';
          fetchBrightnessConfig();
          fetchNumLeds();
          break;

        case '2': // Led Dimmer [PWM]
          pin1Label.textContent = 'PWM';
          pin1Group.style.display = 'flex';
          pin2Group.style.display = 'none';
          pinSeparator.style.display = 'none';
          document.getElementById('pin2').value = '';
          testToggle.style.display = 'none';
          testDigital.style.display = 'none';
          testDuty.style.display = 'flex';
          testDimmer.style.display = 'flex';
          testWW.style.display = 'none';
          testCW.style.display = 'none';
          testTriac.style.display = 'none';
          brightnessLabel.textContent = 'Brillantor per defecte';
          brightnessConfig.style.display = 'flex';
          brightnessCWConfig.style.display = 'none';
          freqConfig.style.display = 'flex';
          numLedsSection.style.display = 'none';
          fetchBrightnessConfig();
          break;

        case '3': // Leds WW/CW [2×PWM]
          pin1Label.textContent = 'WW';
          pin2Label.textContent = 'CW';
          pin1Group.style.display = 'flex';
          pin2Group.style.display = 'flex';
          pinSeparator.style.display = 'flex';
          pin2Group.style.opacity = '0';
          pin2Group.style.transform = 'scale(0.8)';
          setTimeout(() => {
            pin2Group.style.opacity = '1';
            pin2Group.style.transform = 'scale(1)';
          }, 50);
          testToggle.style.display = 'none';
          testDigital.style.display = 'none';
          testDuty.style.display = 'flex';
          testDimmer.style.display = 'none';
          testWW.style.display = 'flex';
          testCW.style.display = 'flex';
          testTriac.style.display = 'none';
          brightnessLabel.textContent = 'Brillantor WW per defecte';
          brightnessConfig.style.display = 'flex';
          brightnessCWConfig.style.display = 'flex';
          freqConfig.style.display = 'flex';
          numLedsSection.style.display = 'none';
          fetchBrightnessConfig();
          break;

        case '4': // Triac control de fase [ZCD + MOC3021S]
          pin1Label.textContent = 'ZCD';
          pin2Label.textContent = 'Triac';
          pin3Label.textContent = 'WS2812';
          pin1Group.style.display = 'flex';
          pin2Group.style.display = 'flex';
          pin2Group.style.opacity = '0';
          pin2Group.style.transform = 'scale(0.8)';
          setTimeout(() => {
            pin2Group.style.opacity = '1';
            pin2Group.style.transform = 'scale(1)';
          }, 50);
          pin3Group.style.display = 'flex';
          pin3Group.style.opacity = '0';
          pin3Group.style.transform = 'scale(0.8)';
          setTimeout(() => {
            pin3Group.style.opacity = '1';
            pin3Group.style.transform = 'scale(1)';
          }, 100);
          pinSeparator.style.display = 'flex';
          pinSeparator2.style.display = 'flex';
          testToggle.style.display = 'none';
          testDigital.style.display = 'none';
          testDuty.style.display = 'flex';
          testDimmer.style.display = 'none';
          testWW.style.display = 'none';
          testCW.style.display = 'none';
          testTriac.style.display = 'flex';
          document.getElementById('testTriacLEDSlider').style.display = 'flex';
          brightnessLabel.textContent = 'Potència del triac per defecte';
          brightnessConfig.style.display = 'flex';
          document.getElementById('brightnessCWConfigLabel').textContent = 'Brillantor LED per defecte';
          brightnessCWConfig.style.display = 'flex';
          numLedsSection.style.display = 'none';
          fetchBrightnessConfig();
          break;
      }
      fetchPins();
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('pinLabelTop').style.display = 'none';
      document.getElementById('pinsContainer').style.display = 'none';
      document.getElementById('pin3Group').style.display = 'none';
      document.getElementById('pinSeparator2').style.display = 'none';
      document.getElementById('testToggleSection').style.display = 'none';
      document.getElementById('testDigitalSection').style.display = 'none';
      document.getElementById('testDutySection').style.display = 'none';
      document.getElementById('testTriacSlider').style.display = 'none';
      document.getElementById('testTriacLEDSlider').style.display = 'none';
      document.getElementById('brightnessConfigSection').style.display = 'none';
      document.getElementById('brightnessCWConfigSection').style.display = 'none';
      document.getElementById('freqConfigSection').style.display = 'none';
      document.getElementById('numLedsSection').style.display = 'none';
    });

    let isInitialSetup = false;

    function fetchBoto() {
      fetch('/boto', {method: 'POST'}).then(r => r.json()).then(data => {
        if (data.boto !== null) document.getElementById('boto_pin_input').value = data.boto;
      }).catch(() => {});
    }

    function fetchInitialSetup() {
      fetch('/initialSetup', {method: 'POST'}).then(r => r.text()).then(t => {
        isInitialSetup = t.trim() === 'true';
        if (isInitialSetup) {
          document.getElementById('initialSetupBanner').style.display = 'block';
        }
      }).catch(() => {});
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    window.onload = function() {
      fetchMyMac();
      fetchConfigMode();
      fetchDriveMode();
      fetchBoto();
      fetchInitialSetup();

      document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = new URLSearchParams(new FormData(this));
        fetch('/', { method: 'POST', body: data })
          .then(() => {
            if (isInitialSetup) {
              showToast('Configuració guardada! Reiniciant...');
            } else {
              showToast('Configuració guardada!');
            }
          })
          .catch(() => showToast('Error en guardar'));
      });
    }
  </script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title">
        <h1>Configurador BlauTrigger</h1>
      </div>
      <a href="https://github.com/CasamaMaker/BlauTrigger" class="github-link" id="githubLink" target="_blank">
        <svg class="github-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
      </a>
    </header>

    <!-- myMAC Card -->
    <div class="card">
      <label for="myMac">La meva adreça MAC</label>
      <div class="values">
        <p><span id="myMac">Carregant...</span></p>
      </div>
    </div>

  <form action="/" method="POST">

    <!-- CONFIGURACIÓ Card -->
    <div class="card">

        <p id="modeInfo" class="mode-info" style="display:none; margin-bottom: 15px;">
          Configuració hardcodejada al codi. Per canviar-la, modifica el firmware.
        </p>

        <div id="initialSetupBanner" style="display:none; background: rgba(255,180,0,0.15); border: 1px solid rgba(255,160,0,0.4); padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9em;">
          El pin del botó no està configurat. Defineix-lo per continuar.
        </div>

        <div id="configFields" class="disabled-section">

          <div class="control-types-section">
            <label class="section-label">Botó</label>
            <div class="pins-container" style="margin-bottom: 20px;">
              <div class="pin-group">
                <label for="boto_pin_input" class="pin-label">Pin</label>
                <input type="tel" id="boto_pin_input" name="boto_pin" placeholder="XX" maxlength="2" pattern="[0-9]{1,2}" inputmode="numeric" class="pin-input"/>
              </div>
            </div>
          </div>

          <div class="control-types-section">
            <label class="section-label">Tipus de control</label>
            <div class="radio-group">
              <label class="radio-option">
                <input type="radio" name="control_type" value="0" class="radio-input" onchange="updateControlTypeUI()"/>
                <span class="radio-custom"></span>
                <span class="radio-text">Relé On/Off</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="control_type" value="1" class="radio-input" onchange="updateControlTypeUI()"/>
                <span class="radio-custom"></span>
                <span class="radio-text">Led digital WS2812</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="control_type" value="2" class="radio-input" onchange="updateControlTypeUI()"/>
                <span class="radio-custom"></span>
                <span class="radio-text">Led Dimmer [PWM]</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="control_type" value="3" class="radio-input" onchange="updateControlTypeUI()"/>
                <span class="radio-custom"></span>
                <span class="radio-text">Leds WW/CW [2×PWM]</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="control_type" value="4" class="radio-input" onchange="updateControlTypeUI()"/>
                <span class="radio-custom"></span>
                <span class="radio-text">Triac control de fase [ZCD]</span>
              </label>
            </div>
          </div>

          <label style="margin: 0;" id="pinLabelTop">Pin de control de la llum</label>
          <div class="pins-container" id="pinsContainer" style="display: none;">
            <div class="pin-group" id="pin1Group">
              <label for="pin1" class="pin-label" id="pin1Label">Pin 1</label>
              <input type="tel" id="pin1" name="pin1" placeholder="XX" maxlength="2" pattern="[0-9]{1,2}" inputmode="numeric" class="pin-input"/>
            </div>
            <div class="pin-separator" id="pinSeparator" style="display: none;">-</div>
            <div class="pin-group" id="pin2Group" style="display: none;">
              <label for="pin2" class="pin-label" id="pin2Label">Pin 2</label>
              <input type="tel" id="pin2" name="pin2" placeholder="XX" maxlength="2" pattern="[0-9]{1,2}" inputmode="numeric" class="pin-input"/>
            </div>
            <div class="pin-separator" id="pinSeparator2" style="display: none;">-</div>
            <div class="pin-group" id="pin3Group" style="display: none;">
              <label for="pin3" class="pin-label" id="pin3Label">WS2812</label>
              <input type="tel" id="pin3" name="pin3" placeholder="XX" maxlength="2" pattern="[0-9]{1,2}" inputmode="numeric" class="pin-input"/>
            </div>
          </div>

          <!-- Nombre de LEDs (només mode 1) -->
          <div id="numLedsSection" style="display: none; flex-direction: column; gap: 8px; margin-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label style="margin: 0;">Nombre de LEDs</label>
              <input type="number" id="numLedsInput" name="num_leds" min="1" max="100" value="1"
                     style="width: 60px; text-align: center;" class="pin-input">
            </div>
          </div>

        </div>

          <!-- Brillantor per defecte (WW per al mode 3) -->
          <div id="brightnessConfigSection" style="display: none; flex-direction: column; gap: 8px; margin-top: 10px; margin-bottom: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label style="margin: 0;" id="brightnessConfigLabel">Brillantor per defecte</label>
              <span id="brightnessConfigValue" style="font-weight: 600; color: var(--primary-color);">100%</span>
            </div>
            <input type="range" id="brightnessConfigSlider" name="brightness" min="0" max="100" value="100" class="duty-slider"
              oninput="document.getElementById('brightnessConfigValue').textContent = this.value + '%'">
          </div>

          <!-- Brillantor CW per defecte (només mode 3) -->
          <div id="brightnessCWConfigSection" style="display: none; flex-direction: column; gap: 8px; margin-top: 4px; margin-bottom: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label style="margin: 0;" id="brightnessCWConfigLabel">Brillantor CW per defecte</label>
              <span id="brightnessCWConfigValue" style="font-weight: 600; color: var(--primary-color);">100%</span>
            </div>
            <input type="range" id="brightnessCWConfigSlider" name="brightness_cw" min="0" max="100" value="100" class="duty-slider"
              oninput="document.getElementById('brightnessCWConfigValue').textContent = this.value + '%'">
          </div>

          <!-- Freqüència PWM (modes 2 i 3) -->
          <div id="freqConfigSection" style="display: none; flex-direction: column; gap: 8px; margin-top: 4px; margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px;">
              <label style="margin: 0;">Freqüència PWM</label>
              <div style="display: flex; align-items: center; gap: 6px;">
                <input type="number" id="pwmFreqInput" name="pwm_freq" min="100" max="40000" value="5000" step="100" class="pin-input" style="width: 6ch; min-width: 10ch; text-align: center;">
                <span style="font-weight: 600; color: var(--primary-color);">Hz</span>
              </div>
            </div>
          </div>

        <input type="submit" id="submitBtn" value="Guardar" />
    </div>

  </form>

    <!-- TEST Card -->
    <div class="card" id="testCard" style="display: none;">
      <label class="section-label">Test</label>
      <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 15px;">

        <!-- Toggle ON/OFF (per a Relé i Led digital) -->
        <div id="testToggleSection" style="display: none; justify-content: space-between; align-items: center;">
          <label for="testSwitch" style="margin: 0;">ON/OFF</label>
          <label class="toggle-switch">
            <input type="checkbox" id="testSwitch" onchange="handleTestSwitch(this)">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- Color i Brillantor (per a Led digital) -->
        <div id="testDigitalSection" style="display: none; flex-direction: column; gap: 15px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <label for="colorPicker" style="margin: 0;">Color</label>
            <input type="color" id="colorPicker" value="#0000ff" oninput="handleColorChange(this)" class="color-picker">
          </div>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="brightnessSlider" style="margin: 0;">Brillantor</label>
              <span id="brightnessValue" style="font-weight: 600; color: var(--primary-color);">100%</span>
            </div>
            <input type="range" id="brightnessSlider" min="0" max="100" value="100" class="duty-slider" oninput="handleBrightnessChange(this)">
          </div>
        </div>

        <!-- Brillantor PWM i WW/CW (per a modes 2 i 3) -->
        <div id="testDutySection" style="display: none; flex-direction: column; gap: 15px;">

          <!-- Toggle ON/OFF -->
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <label style="margin: 0;">ON/OFF</label>
            <label class="toggle-switch">
              <input type="checkbox" id="testDutySwitch" onchange="handleDutySwitch(this)">
              <span class="toggle-slider"></span>
            </label>
          </div>

          <!-- Slider únic (mode 2: Led Dimmer) -->
          <div id="testDimmerSlider" style="display: none; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="dutySlider" style="margin: 0;">Brillantor</label>
              <span id="dutyValue" style="font-weight: 600; color: var(--primary-color);">0%</span>
            </div>
            <input type="range" id="dutySlider" min="0" max="100" value="0" class="duty-slider" oninput="handleDutyChange(this)">
          </div>

          <!-- Slider WW (mode 3) -->
          <div id="testWWSlider" style="display: none; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="wwSlider" style="margin: 0;">Brillantor WW</label>
              <span id="wwValue" style="font-weight: 600; color: var(--primary-color);">0%</span>
            </div>
            <input type="range" id="wwSlider" min="0" max="100" value="0" class="duty-slider" oninput="handleWWChange(this)">
          </div>

          <!-- Slider CW (mode 3) -->
          <div id="testCWSlider" style="display: none; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="cwSlider" style="margin: 0;">Brillantor CW</label>
              <span id="cwValue" style="font-weight: 600; color: var(--primary-color);">0%</span>
            </div>
            <input type="range" id="cwSlider" min="0" max="100" value="0" class="duty-slider" oninput="handleCWChange(this)">
          </div>

          <!-- Slider potència Triac (mode 4) -->
          <div id="testTriacSlider" style="display: none; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="triacSlider" style="margin: 0;">Potència triac</label>
              <span id="triacValue" style="font-weight: 600; color: var(--primary-color);">50%</span>
            </div>
            <input type="range" id="triacSlider" min="1" max="100" value="50" class="duty-slider" oninput="handleTriacChange(this)">
          </div>

          <!-- Slider brillantor LED (mode 4) -->
          <div id="testTriacLEDSlider" style="display: none; flex-direction: column; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="triacLEDSlider" style="margin: 0;">Brillantor LED</label>
              <span id="triacLEDValue" style="font-weight: 600; color: var(--primary-color);">50%</span>
            </div>
            <input type="range" id="triacLEDSlider" min="0" max="100" value="50" class="duty-slider" oninput="handleTriacLEDChange(this)">
          </div>

        </div>

      </div>
    </div>

  </div>

  <footer>
    <p>BlauTrigger 1.0 | Martí Casamayor</p>
